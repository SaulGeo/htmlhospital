<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clínica Healer - Servicios</title>

<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        margin: 0;
        background: #f0f8ff;
        color: #333;
    }

    header {
        background: #000000;
        color: white;
        padding: 20px;
        text-align: center;
    }

    .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 10px;
    }

    .logo-img {
        height: 70px;
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .logo-img:hover {
        transform: rotate(360deg) scale(1.2);
    }

    .brand-name {
        color: white;
        font-size: 2.5rem;
        margin: 0;
        letter-spacing: 1px;
    }
    .menu {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
        margin-top: 15px;
    }

    .menu a {
        background: white;
        color: #000;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s ease;
        border: 2px solid transparent;
    }

    .menu a:hover {
        background: #2ce585;
        color: white;
        transform: translateY(-3px);
    }

  
    .servicios-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 25px;
        padding: 40px 20px;
    }

    .contenedor {
        display: flex;
        flex-direction: row; /* Imagen a la izquierda, texto a la derecha */
        align-items: center;
        background: white;
        width: 450px; /* Ancho fijo para que quepan de dos en dos o tres */
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
        cursor: pointer;
        border: 1px solid transparent;
    }

    .contenedor:hover {
        transform: translateY(-10px);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        border: 1px solid #2ecc71;
    }

    .contenedor img {
        width: 120px;
        height: 120px;
        object-fit: cover; /* Evita que la imagen se deforme */
        border-radius: 12px;
        margin-right: 20px;
    }

    .texto {
        flex: 1; /* Toma el espacio restante */
    }

    .texto h2 {
        margin: 0 0 10px 0;
        color: #2c3e50;
        font-size: 1.4rem;
    }

    .texto p {
        margin: 5px 0;
        font-size: 0.9rem;
        color: #666;
        line-height: 1.4;
    }

    .texto a {
        display: inline-block;
        margin-top: 10px;
        color: #2ecc71;
        text-decoration: none;
        font-weight: bold;
        border-bottom: 2px solid transparent;
        transition: 0.3s;
    }

    .texto a:hover {
        border-bottom: 2px solid #2ecc71;
    }

    .boton-volver {
        display: block;
        width: fit-content;
        margin: 20px auto 50px auto;
        background: #34495e;
        color: white;
        padding: 12px 30px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
    }

    .boton-volver:hover {
        background: #000;
    }
</style>
</head>
